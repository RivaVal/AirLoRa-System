# docker-compose.yml
services:
  rpi-dev-ide:
    build:
      context: .
      dockerfile: Dockerfile.rpi-zero2w
    container_name: rpi-zero2w-dev
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace:cached
    environment:
      - TZ=Europe/Moscow
    stdin_open: true
    tty: true
    restart: unless-stopped
